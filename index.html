<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSaathi</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            color:#4F46E5;
        }

        p{
            color:#555;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>SmartSaathi</h1>

<p>
Secure Medical Ecosystem for Emergency Assistance.
This application helps users store medical information
and contact guardians in emergency situations.
</p>

</div>
  
<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:350px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

h1{
color:#4F46E5;
margin-bottom:10px;
}

p{
color:#555;
font-size:14px;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
text-align:left;
}

label{
font-size:12px;
font-weight:bold;
color:#666;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#4F46E5;
border:none;
color:white;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

</style>

</head>

<body>

<div class="container">

<h1>SmartSaathi</h1>

<p>Enter your identity details for emergency assistance</p>

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="input-group">
<label>Age</label>
<input type="number" placeholder="Enter your age">
</div>

<button>Continue</button>

</div>




</body>
</html>
