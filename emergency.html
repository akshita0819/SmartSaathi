<!DOCTYPE html>

<style>

<body>

<div class="container">

<h2>Emergency Contact</h2>

<div class="input-group">
<label>Guardian Name</label>
<input type="text" id="guardian">
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" id="phone">
</div>

<button onclick="saveContact()">Save Contact</button>

</div>

<script>

function saveContact(){

let guardian=document.getElementById("guardian").value;
let phone=document.getElementById("phone").value;

if(!guardian || !phone){
alert("Please fill guardian details");
return;
}

let db=JSON.parse(localStorage.getItem("saathi_v4_final")) || {};

db.g1={
name:guardian,
p:phone
};

localStorage.setItem("saathi_v4_final",JSON.stringify(db));

alert("Emergency contact saved");

}

</script>

</body>
