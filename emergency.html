<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Contact</title>

<style>

body{
font-family: Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#4F46E5;
}

.input-group{
margin-bottom:15px;
}

label{
font-size:13px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
}

button{
width:100%;
padding:12px;
background:#4F46E5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

</style>
</head>

<body>

<div class="container">

<h2>Emergency Contact</h2>

<div class="input-group">
<label>Guardian Name</label>
<input type="text" placeholder="Enter guardian name">
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number">
</div>

<button>Save Contact</button>

</div>

</body>
</html>
