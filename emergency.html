
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency Contacts</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:380px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#4F46E5;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
font-size:13px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
}

button{
width:100%;
padding:12px;
background:#4F46E5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

button:hover{
background:#4338ca;
}

</style>

</head>

<body>

<div class="container">

<h2>Emergency Contacts</h2>

<div class="input-group">
<label>Doctor Name</label>
<input type="text" id="doctorName">
</div>

<div class="input-group">
<label>Doctor Phone</label>
<input type="tel" id="doctorPhone">
</div>

<div class="input-group">
<label>Guardian 1 Name</label>
<input type="text" id="g1Name">
</div>

<div class="input-group">
<label>Guardian 1 Phone</label>
<input type="tel" id="g1Phone">
</div>

<div class="input-group">
<label>Guardian 2 Name</label>
<input type="text" id="g2Name">
</div>

<div class="input-group">
<label>Guardian 2 Phone</label>
<input type="tel" id="g2Phone">
</div>

<button onclick="saveContacts()">Save Contacts</button>

</div>

<script>

function saveContacts(){

let docName=document.getElementById("doctorName").value;
let docPhone=document.getElementById("doctorPhone").value;

let g1Name=document.getElementById("g1Name").value;
let g1Phone=document.getElementById("g1Phone").value;

let g2Name=document.getElementById("g2Name").value;
let g2Phone=document.getElementById("g2Phone").value;

let numbers=[docPhone,g1Phone,g2Phone].filter(n=>n);

if(new Set(numbers).size!==numbers.length){

alert("Phone numbers must be unique");

return;

}

let db=JSON.parse(localStorage.getItem("saathi_v4_final"))||{};

db.doctor={
name:docName,
p:docPhone
};

db.g1={
name:g1Name,
p:g1Phone
};

db.g2={
name:g2Name,
p:g2Phone
};

localStorage.setItem("saathi_v4_final",JSON.stringify(db));

alert("Emergency contacts saved");

window.location.href="index.html";

}

</script>

</body>
</html>
